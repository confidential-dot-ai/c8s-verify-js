name: Test

on:
  push:
    branches: [main]
  pull_request:
  # Called by release.yml on tag pushes so a release is gated on the exact same
  # checks, and publishes the same `wasm` artifact the tests ran against.
  workflow_call:

# The verifier WASM is generated from attestation-rs at a pinned commit — the
# in-tree `vendor/attestation-rs` submodule gitlink (see src/wasm/README.md) — and
# is not committed. Build it once here and share it with the test jobs as an artifact.
# NOTE: release.yml downloads the `wasm` artifact by name — keep them in sync.

jobs:
  build-wasm:
    name: Build WASM verifier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # vendor/attestation-rs is a public repo, so the default credentials
          # fetch the submodule — no PAT/app token needed.
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: jetli/wasm-pack-action@v0.4.0
      - name: Build src/wasm/
        run: npm run build:wasm
      - uses: actions/upload-artifact@v4
        with:
          name: wasm
          if-no-files-found: error
          path: |
            src/wasm/attestation_wasm.js
            src/wasm/attestation_wasm_bg.wasm
            src/wasm/attestation_wasm.d.ts
            src/wasm/attestation_wasm_bg.wasm.d.ts

  unit:
    name: Unit & E2E (Node ${{ matrix.node }})
    needs: build-wasm
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: wasm
          path: src/wasm
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test

  lint:
    name: Typecheck, lint & format
    needs: build-wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Type-aware linting resolves the generated WASM verifier's types, so the
      # artifact must be present (src/wasm-loader.ts references ./wasm/*.d.ts).
      - uses: actions/download-artifact@v4
        with:
          name: wasm
          path: src/wasm
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check

  browser:
    name: Browser smoke test
    needs: build-wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: wasm
          path: src/wasm
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run browser-check
